name: OSSF Scorecards

on:
  schedule:
    - cron: '20 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecards analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run Scorecards
        uses: ossf/scorecard-action@v2 # stable tag; exact SHA not available locally
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecards artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecards-sarif
          path: results.sarif
          retention-days: 7

      - name: Upload Scorecards SARIF
        uses: github/codeql-action/upload-sarif@e03543dad62555ecf6606aabe9724fd07e1cd632 # v3.32.6
        with:
          sarif_file: results.sarif
