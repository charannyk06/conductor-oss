name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type (overrides auto-detection)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  NODE_VERSION: 22

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip bot release commits to prevent infinite loops
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore: release v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── Build (dependency order) ──────────────────────────────
      - name: Build core
        run: bun run --cwd packages/core build

      - name: Build plugins
        run: |
          for dir in packages/plugins/*/; do
            if [ -f "$dir/package.json" ]; then
              bun run --cwd "$dir" build
            fi
          done

      - name: Build CLI
        run: bun run --cwd packages/cli build

      - name: Build web
        run: bun run --cwd packages/web build

      - name: Build Rust
        run: cargo build --workspace --release

      # ── Test ──────────────────────────────────────────────────
      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run frontend tests
        run: |
          bun run --cwd packages/core test || true
          bun run --cwd packages/cli test || true

      # ── Version ───────────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          # Gather version sources
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          tag_ver="${last_tag#v}"
          [ -z "$tag_ver" ] && tag_ver="0.0.0"

          pkg_ver=$(node -p "require('./packages/cli/package.json').version")
          npm_ver=$(npm view conductor-oss version 2>/dev/null || echo "0.0.0")

          echo "Tag: $tag_ver | Package: $pkg_ver | npm: $npm_ver"

          # Use the highest as base
          base=$(node -e "
            const vs=['$tag_ver','$pkg_ver','$npm_ver'];
            const p=v=>v.split('.').map(Number);
            vs.sort((a,b)=>{const pa=p(a),pb=p(b);for(let i=0;i<3;i++)if((pa[i]||0)!==(pb[i]||0))return(pa[i]||0)-(pb[i]||0);return 0});
            console.log(vs[vs.length-1]);
          ")

          # Determine bump type from conventional commits or manual input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            bump="${{ inputs.version_type }}"
          else
            if [ -n "$last_tag" ]; then
              commits=$(git log --pretty=format:"%s" "$last_tag"..HEAD)
            else
              commits=$(git log --pretty=format:"%s" -20)
            fi

            if echo "$commits" | grep -qE '^[a-z]+(\(.*\))?!:|BREAKING CHANGE'; then
              bump="major"
            elif echo "$commits" | grep -qE '^feat(\(.*\))?:'; then
              bump="minor"
            else
              bump="patch"
            fi
          fi

          # Compute next version
          next=$(node -e "
            const [M,m,p]='$base'.split('.').map(Number);
            if('$bump'==='major')console.log((M+1)+'.0.0');
            else if('$bump'==='minor')console.log(M+'.'+(m+1)+'.0');
            else console.log(M+'.'+m+'.'+(p+1));
          ")

          echo "Bump: $bump | $base -> $next"
          echo "new_version=$next" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$next" >> "$GITHUB_OUTPUT"

      - name: Check if already released
        id: check
        run: |
          tag="${{ steps.version.outputs.tag_name }}"
          ver="${{ steps.version.outputs.new_version }}"

          # Skip if tag exists or version already on npm
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Tag $tag already exists — skipping"
          elif npm view "conductor-oss@$ver" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ v$ver already on npm — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Publish ───────────────────────────────────────────────
      - name: Stamp version into packages
        if: steps.check.outputs.skip != 'true'
        run: |
          node -e "
            const fs=require('fs'),{execSync}=require('child_process');
            const files=execSync('find packages -name package.json -not -path \"*/node_modules/*\" -not -path \"*/.next/*\"',{encoding:'utf8'}).trim().split('\n').filter(Boolean);
            for(const f of files){
              const pkg=JSON.parse(fs.readFileSync(f,'utf8'));
              if(pkg.private)continue;
              pkg.version='${{ steps.version.outputs.new_version }}';
              for(const dt of['dependencies','devDependencies','peerDependencies']){
                if(!pkg[dt])continue;
                for(const[n,v]of Object.entries(pkg[dt])){
                  if(n.startsWith('@conductor-oss/')&&!v.startsWith('file:')&&!v.startsWith('workspace:'))
                    pkg[dt][n]='${{ steps.version.outputs.new_version }}';
                }
              }
              fs.writeFileSync(f,JSON.stringify(pkg,null,2)+'\n');
            }
          "

      - name: Pack CLI
        if: steps.check.outputs.skip != 'true'
        id: pack
        run: |
          mkdir -p .release-artifacts
          cd packages/cli && npm pack --pack-destination ../../.release-artifacts && cd ../..
          echo "tarball_path=$(ls .release-artifacts/*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Tag release
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag_name }}" \
            -m "Release ${{ steps.version.outputs.tag_name }}"
          git push origin "${{ steps.version.outputs.tag_name }}"

      - name: Generate release notes
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ steps.version.outputs.tag_name }}" \
            -f target_commitish=main \
            --jq '.body' > /tmp/notes.md 2>/dev/null || true

          if [ ! -s /tmp/notes.md ]; then
            prev=$(git tag --sort=-v:refname | grep -v "${{ steps.version.outputs.tag_name }}" | head -1)
            if [ -n "$prev" ]; then
              echo "## What's Changed" > /tmp/notes.md
              git log --pretty=format:"* %s" "$prev"..HEAD >> /tmp/notes.md
            else
              echo "## Initial Release" > /tmp/notes.md
            fi
          fi

          cat >> /tmp/notes.md << 'FOOTER'

          ---

          ### Install

          ```bash
          npm install -g conductor-oss@latest
          ```
          FOOTER

      - name: Create GitHub release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag_name }}" \
            "${{ steps.pack.outputs.tarball_path }}" \
            --title "Release v${{ steps.version.outputs.new_version }}" \
            --notes-file /tmp/notes.md --latest

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish "${{ steps.pack.outputs.tarball_path }}" --access public --provenance
          echo "✅ Published conductor-oss@${{ steps.version.outputs.new_version }}"

      - name: Annotate release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body=$(gh release view "${{ steps.version.outputs.tag_name }}" --json body --jq '.body')
          printf '%s\n\n✅ **Published to npm**\n' "$body" > /tmp/final.md
          gh release edit "${{ steps.version.outputs.tag_name }}" --notes-file /tmp/final.md
