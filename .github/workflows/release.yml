name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type (overrides auto-detection)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: read

env:
  NODE_VERSION: 22

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      new_version: ${{ steps.version.outputs.new_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Determine version
        id: version
        shell: bash
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          tag_ver="${last_tag#v}"
          [ -z "$tag_ver" ] && tag_ver="0.0.0"

          pkg_ver=$(node -p "require('./packages/cli/package.json').version")
          npm_ver=$(npm view conductor-oss version 2>/dev/null || echo "0.0.0")

          echo "Tag: $tag_ver | Package: $pkg_ver | npm: $npm_ver"

          base=$(node -e "
            const vs=['$tag_ver','$pkg_ver','$npm_ver'];
            const p=v=>v.split('.').map(Number);
            vs.sort((a,b)=>{const pa=p(a),pb=p(b);for(let i=0;i<3;i++)if((pa[i]||0)!==(pb[i]||0))return(pa[i]||0)-(pb[i]||0);return 0});
            console.log(vs[vs.length-1]);
          ")

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            bump="${{ inputs.version_type }}"
          else
            if [ -n "$last_tag" ]; then
              commits=$(git log --pretty=format:"%s" "$last_tag"..HEAD)
            else
              commits=$(git log --pretty=format:"%s" -20)
            fi

            if echo "$commits" | grep -qE '^[a-z]+(\(.*\))?!:|BREAKING CHANGE'; then
              bump="major"
            elif echo "$commits" | grep -qE '^feat(\(.*\))?:'; then
              bump="minor"
            else
              bump="patch"
            fi
          fi

          next=$(node -e "
            const [M,m,p]='$base'.split('.').map(Number);
            if('$bump'==='major')console.log((M+1)+'.0.0');
            else if('$bump'==='minor')console.log(M+'.'+(m+1)+'.0');
            else console.log(M+'.'+m+'.'+(p+1));
          ")

          echo "Bump: $bump | $base -> $next"
          echo "new_version=$next" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$next" >> "$GITHUB_OUTPUT"

      - name: Check if already released
        id: check
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag_name }}"
          ver="${{ steps.version.outputs.new_version }}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Tag $tag already exists — skipping"
          elif npm view "conductor-oss@$ver" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ conductor-oss@$ver already on npm — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  native:
    needs: version
    if: needs.version.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: darwin-universal
            os: macos-latest
            binary_path: target/release/conductor
          - id: linux-x64
            os: ubuntu-latest
            binary_path: target/release/conductor
          - id: win32-x64
            os: windows-latest
            binary_path: target/release/conductor.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Stamp version into packages
        shell: bash
        run: |
          node -e "
            const fs=require('fs'),{execSync}=require('child_process');
            const files=execSync('find packages -name package.json -not -path \"*/node_modules/*\" -not -path \"*/.next/*\"',{encoding:'utf8'}).trim().split('\n').filter(Boolean);
            for(const f of files){
              const pkg=JSON.parse(fs.readFileSync(f,'utf8'));
              if(pkg.private)continue;
              pkg.version='${{ needs.version.outputs.new_version }}';
              for(const dt of['dependencies','devDependencies','peerDependencies','optionalDependencies']){
                if(!pkg[dt])continue;
                for(const[n,v]of Object.entries(pkg[dt])){
                  if(n.startsWith('@conductor-oss/')&&!v.startsWith('file:')&&!v.startsWith('workspace:'))
                    pkg[dt][n]='${{ needs.version.outputs.new_version }}';
                }
              }
              fs.writeFileSync(f,JSON.stringify(pkg,null,2)+'\n');
            }
          "

      - name: Build native binary
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.id }}" = "darwin-universal" ]; then
            rustup target add x86_64-apple-darwin aarch64-apple-darwin
            cargo build -p conductor-cli --release --target x86_64-apple-darwin
            cargo build -p conductor-cli --release --target aarch64-apple-darwin
            mkdir -p target/release
            lipo -create \
              target/x86_64-apple-darwin/release/conductor \
              target/aarch64-apple-darwin/release/conductor \
              -output target/release/conductor
          else
            cargo build -p conductor-cli --release
          fi

      - name: Pack native tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .release-native
          tarball_path=$(node scripts/pack-cli-native.mjs \
            --target "${{ matrix.id }}" \
            --binary-path "${{ matrix.binary_path }}" \
            --pack-destination .release-native | tail -n 1)
          echo "tarball_path=$tarball_path" >> "$GITHUB_OUTPUT"

      - name: Upload native tarball
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.id }}
          path: ${{ steps.pack.outputs.tarball_path }}
          if-no-files-found: error

  release:
    needs:
      - version
      - native
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core
        run: bun run --cwd packages/core build

      - name: Build plugins
        shell: bash
        run: |
          for dir in packages/plugins/*/; do
            if [ -f "$dir/package.json" ]; then
              bun run --cwd "$dir" build
            fi
          done

      - name: Build CLI
        run: bun run --cwd packages/cli build

      - name: Build web
        run: bun run --cwd packages/web build

      - name: Build Rust
        run: cargo build -p conductor-cli --release

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run frontend tests
        shell: bash
        run: |
          bun run --cwd packages/core test || true
          bun run --cwd packages/cli test || true

      - name: Stamp version into packages
        shell: bash
        run: |
          node -e "
            const fs=require('fs'),{execSync}=require('child_process');
            const files=execSync('find packages -name package.json -not -path \"*/node_modules/*\" -not -path \"*/.next/*\"',{encoding:'utf8'}).trim().split('\n').filter(Boolean);
            for(const f of files){
              const pkg=JSON.parse(fs.readFileSync(f,'utf8'));
              if(pkg.private)continue;
              pkg.version='${{ needs.version.outputs.new_version }}';
              for(const dt of['dependencies','devDependencies','peerDependencies','optionalDependencies']){
                if(!pkg[dt])continue;
                for(const[n,v]of Object.entries(pkg[dt])){
                  if(n.startsWith('@conductor-oss/')&&!v.startsWith('file:')&&!v.startsWith('workspace:'))
                    pkg[dt][n]='${{ needs.version.outputs.new_version }}';
                }
              }
              fs.writeFileSync(f,JSON.stringify(pkg,null,2)+'\n');
            }
          "

      - name: Pack CLI
        id: pack
        shell: bash
        run: |
          set -eo pipefail
          mkdir -p .release-artifacts
          tarball_path=$(node scripts/pack-cli-release.mjs --pack-destination .release-artifacts | tail -n 1)
          echo "tarball_path=$tarball_path" >> "$GITHUB_OUTPUT"

      - name: Verify packaged CLI
        run: node scripts/verify-cli-package.mjs

      - name: Download native tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: .release-native
          merge-multiple: true

      - name: Publish native packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for tarball in .release-native/*.tgz; do
            npm publish "$tarball" --access public --provenance
          done

      - name: Publish CLI to npm release-candidate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          npm publish "${{ steps.pack.outputs.tarball_path }}" --access public --provenance --tag release-candidate

      - name: Verify published npm packages
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.new_version }}"

          node scripts/verify-npm-publication.mjs \
            --package conductor-oss-native-darwin-universal \
            --version "$version" \
            --require-file bin/conductor

          node scripts/verify-npm-publication.mjs \
            --package conductor-oss-native-linux-x64 \
            --version "$version" \
            --require-file bin/conductor

          node scripts/verify-npm-publication.mjs \
            --package conductor-oss-native-win32-x64 \
            --version "$version" \
            --require-file bin/conductor.exe

          node scripts/verify-npm-publication.mjs \
            --package conductor-oss \
            --version "$version" \
            --require-file dist/launcher.js \
            --require-file web/package.json

      - name: Promote CLI npm dist-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.new_version }}"
          npm dist-tag add "conductor-oss@$version" latest
          npm dist-tag rm conductor-oss release-candidate || true
          echo "✅ Published conductor-oss@$version"

      - name: Tag release
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag_name }}" \
            -m "Release ${{ needs.version.outputs.tag_name }}"
          git push origin "${{ needs.version.outputs.tag_name }}"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          node scripts/generate-release-notes.mjs \
            --repo "${{ github.repository }}" \
            --current-tag "${{ needs.version.outputs.tag_name }}" > /tmp/notes.md

          cat >> /tmp/notes.md << 'FOOTER'

          ---

          ### Install

          ```bash
          npm install -g conductor-oss@latest
          ```
          FOOTER

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ needs.version.outputs.tag_name }}" \
            "${{ steps.pack.outputs.tarball_path }}" \
            .release-native/*.tgz \
            --title "Release v${{ needs.version.outputs.new_version }}" \
            --notes-file /tmp/notes.md --latest

      - name: Annotate release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          body=$(gh release view "${{ needs.version.outputs.tag_name }}" --json body --jq '.body')
          printf '%s\n\n✅ **Published to npm**\n' "$body" > /tmp/final.md
          gh release edit "${{ needs.version.outputs.tag_name }}" --notes-file /tmp/final.md
