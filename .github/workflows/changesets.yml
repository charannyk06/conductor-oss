name: Create Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect pending changesets
        id: changesets
        run: |
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' ! -name 'config.json' -print -quit | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when there is nothing to release
        if: steps.changesets.outputs.has_changesets != 'true'
        run: echo "No pending changesets on main."

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm version-packages

      - name: Build publishable packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm build:release

      - name: Verify release artifact
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm release:verify

      - name: Pack release artifact
        if: steps.changesets.outputs.has_changesets == 'true'
        id: pack
        run: pnpm release:pack

      - name: Commit release versions
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release packages [skip ci]"

      - name: Create tag
        if: steps.changesets.outputs.has_changesets == 'true'
        run: git tag "${{ steps.pack.outputs.tag_name }}"

      - name: Push release commit and tag
        if: steps.changesets.outputs.has_changesets == 'true'
        run: git push origin HEAD:main --follow-tags

      - name: Create GitHub release with verified tarball
        if: steps.changesets.outputs.has_changesets == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.pack.outputs.tag_name }}" "${{ steps.pack.outputs.tarball_path }}" \
            --title "${{ steps.pack.outputs.tag_name }}" \
            --notes "Verified release for ${{ steps.pack.outputs.package_name }} ${{ steps.pack.outputs.version }}"
