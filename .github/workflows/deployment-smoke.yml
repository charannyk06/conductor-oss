name: Deployment Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-production-smoke:
    name: Web production smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Vercel previews are provided by Git integration; this checks the same
      # production build/start path without depending on deployment secrets.
      - name: Build production web app
        run: bun run --cwd packages/web build

      - name: Start production web app
        run: |
          bun run --cwd packages/web start -- --hostname 127.0.0.1 --port 4010 >/tmp/conductor-web-smoke.log 2>&1 &
          echo $! >/tmp/conductor-web-smoke.pid

      - name: Probe production web app
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error --location http://127.0.0.1:4010/ >/tmp/conductor-web-smoke.html; then
              grep -q "<title>Conductor</title>" /tmp/conductor-web-smoke.html
              exit 0
            fi
            sleep 1
          done
          cat /tmp/conductor-web-smoke.log
          exit 1

      - name: Stop production web app
        if: always()
        run: |
          if [ -f /tmp/conductor-web-smoke.pid ]; then
            kill "$(cat /tmp/conductor-web-smoke.pid)" || true
          fi
