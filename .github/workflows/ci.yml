name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (check, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  frontend:
    name: Frontend (build, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build in dependency order: core → cli → web
      - name: Build core
        run: bun run --cwd packages/core build

      - name: Build CLI
        run: bun run --cwd packages/cli build

      - name: Build web
        run: bun run --cwd packages/web build

      # Typecheck after build so workspace:* deps are resolved
      - name: Typecheck core
        run: bun run --cwd packages/core typecheck

      - name: Typecheck CLI
        run: bun run --cwd packages/cli typecheck

      - name: Typecheck web
        run: bun run --cwd packages/web typecheck

      - name: Test core
        run: bun run --cwd packages/core test
        continue-on-error: true

      - name: Test CLI
        run: bun run --cwd packages/cli test
        continue-on-error: true
