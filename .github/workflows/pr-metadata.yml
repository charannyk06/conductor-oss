name: PR metadata

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, edited]

jobs:
  validate-metadata:
    name: Validate PR metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR title and description
        run: node scripts/validate-pr-description.mjs
