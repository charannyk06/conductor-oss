version: 2

updates:
  # Root monorepo (pnpm workspace)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 10
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
    ignore:
      # Zod v4 has breaking changes — pin to v3
      - dependency-name: "zod"
        versions: [">=4.0.0"]
      # Skip patch bumps to reduce noise
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # Rust / Cargo
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 10
    ignore:
      # Skip patch bumps to reduce noise
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
