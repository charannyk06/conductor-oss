# Conductor Configuration
# Docs: https://github.com/charannyk06/conductor-oss

port: 4747

# Optional: interactive UI preferences (also editable from dashboard settings)
preferences:
  onboardingAcknowledged: false
  codingAgent: claude-code
  ide: vscode
  # Optional: enable "Open in VS Code" from the dashboard for remote worktrees.
  # Keep using ngrok / Cloudflare Tunnel / a reverse proxy for dashboard access;
  # these fields only power editor deep links.
  # remoteSshHost: conductor-dev
  # remoteSshUser: ubuntu
  markdownEditor: obsidian
  notifications:
    soundEnabled: true
    soundFile: abstract-sound-4

# URL shown in board card links (set this to your actual dashboard URL)
# dashboardUrl: http://localhost:4747

# Optional: board paths to watch (explicit files + glob patterns)
# boards:
#   # Defaults to:
#   #   - CONDUCTOR.md
#   #   - projects/*/CONDUCTOR.md
#   - CONDUCTOR.md
#   - projects/*/CONDUCTOR.md
#   - path: projects/*/*.md
#     aliases:
#       intake: ["Inbox", "Backlog", "To do"]
#       ready: ["Ready to Dispatch", "Ready"]
#       review: ["Review", "In Review"]
#       done: ["Done"]

# Optional: global fallback aliases applied to all boards
# columnAliases:
#   intake: ["Inbox", "Backlog", "To do"]
#   ready: ["Ready to Dispatch", "Ready"]
#   review: ["Review", "In Review"]
#   done: ["Done"]

# Optional: MCP servers available to all projects by default
# defaults:
#   mcpServers:
#     filesystem:
#       command: npx
#       args: ["-y", "@modelcontextprotocol/server-filesystem", "/"]
#     github:
#       command: npx
#       args: ["-y", "@modelcontextprotocol/server-github"]
#       env:
#         GITHUB_TOKEN: "${GITHUB_TOKEN}"

projects:
  my-app:
    path: ~/projects/my-app        # Path to your project (must be a git repo)
    repo: your-org/my-app          # GitHub org/repo (for PR tracking)
    agent: claude-code             # "claude-code", "codex", "gemini", "amp", "cursor-cli", "opencode", "droid", "qwen-code", "ccr", or "github-copilot"
    agentConfig:
      model: claude-sonnet-4-6     # claude-sonnet-4-6, claude-opus-4-6, o4-mini, etc.
      permissions: skip            # "skip" = fully autonomous (no prompts)
    # Optional profile presets used by #profile/<name> tags or defaultProfile
    defaultProfile: fast
    agentProfiles:
      fast:
        agent: codex
        model: gpt-5.3-codex-spark
        permissions: skip
      deep:
        agent: claude-code
        model: claude-opus-4-6
        permissions: default
    # Optional project dev server for preview/test loop
    # devServer:
    #   command: pnpm dev
    #   cwd: ~/projects/my-app
    workspace: worktree            # git worktree isolation per task
    runtime: tmux                  # tmux session runner
    scm: github                    # GitHub PR/CI integration
    # Optional: MCP servers for this project (merged with defaults, project wins)
    # mcpServers:
    #   postgres:
    #     command: npx
    #     args: ["-y", "@modelcontextprotocol/server-postgres"]
    #     env:
    #       DATABASE_URL: "postgresql://localhost/my_app_dev"

  # Add more projects:
  # backend:
  #   path: ~/projects/backend
  #   repo: your-org/backend
  #   agent: codex
  #   agentConfig:
  #     model: o4-mini

# Optional: Discord notifications
# plugins:
#   discord:
#     channelId: "YOUR_CHANNEL_ID"
#     tokenEnvVar: DISCORD_BOT_TOKEN

# Optional: Desktop notifications (macOS/Linux)
plugins:
  desktop:
    sound: true
